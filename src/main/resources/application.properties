spring.application.name=classsystem

# 1. Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/class_system_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Mmsql@21}

# 2. JPA / Hibernate Properties
# ?????? ???? Java Classes ??? Database Tables ??? ???????
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. File Upload Properties (PDF/Images ???? ????? ????)
# ?????? YouTube ???? 10MB ??????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 4. Server Port (Optional)
# ????? ??????????? ???? 8080 ???????? ????? ??? ?????? ??? ????? ?????
server.port=8080

# Enable multipart uploads and set a realistic ceiling (e.g., 50MB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Define where files will be stored on your system disk
# Define where files will be stored on your system disk
app.upload.dir=uploads/submissions
app.upload.profiles.dir=uploads/profiles

# ── Email / SMTP (set env vars; build will NOT crash on empty values) ──────────
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Disable actual sending when SMTP_USER is not set (prevents startup failure)
spring.mail.test-connection=false

# ── Twilio SMS (set env vars; service will log warning and skip if empty) ──────
twilio.account.sid=${TWILIO_SID:}
twilio.auth.token=${TWILIO_TOKEN:}
twilio.from.number=${TWILIO_FROM:}

# ── App Name ───────────────────────────────────────────────────────────────────
app.name=ZeroState LMS